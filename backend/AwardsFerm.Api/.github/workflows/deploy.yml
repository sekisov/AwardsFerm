name: AwardsFerm API Deployment

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERFILE_PATH: backend/AwardsFerm.Api/Dockerfile
  CONTAINER_PORT: 8080
  HOST_PORT: 55501
  DEPLOY_DIR: /opt/awardsferm-api
  IMAGE_NAME: awardsferm-api

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          echo "Secrets OK"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore / build
        run: |
          dotnet restore src/AwardsFerm.Api/AwardsFerm.Api.csproj
          dotnet build src/AwardsFerm.Api/AwardsFerm.Api.csproj --configuration Release --no-restore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarball
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-api
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

  deploy:
    needs: [build, preflight]
    runs-on: ubuntu-latest
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-api
          path: .

      - name: Copy image to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "${{ env.IMAGE_NAME }}.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Load and run container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            EDGE_NETWORK="awardsferm-edge"

            mkdir -p "$DEPLOY_DIR"
            docker network create "$EDGE_NETWORK" 2>/dev/null || true
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              --network "$EDGE_NETWORK" \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e Worker__BaseUrl=http://awardsferm-worker:8081 \
              -e YandexRsya__OAuthToken='${{ secrets.RSYA_OAUTH_TOKEN }}' \
              $IMAGE_NAME:latest
            sleep 4
            CODE=$(curl -sS -o /tmp/api_health.txt -w "%{http_code}" --max-time 30 "http://127.0.0.1:${HOST_PORT}/api/health" || echo "000")
            echo "GET /api/health HTTP $CODE"
            docker image prune -f
