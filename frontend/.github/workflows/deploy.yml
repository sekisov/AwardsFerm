name: Deploy frontend to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: awardsferm-frontend
  HOST_PORT: '55502'
  CONTAINER_PORT: '80'

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PROD secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          echo "PROD secrets OK"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve VITE_API_URL
        id: vite
        run: |
          V='${{ secrets.VITE_API_URL }}'
          echo "url=$V" >> "$GITHUB_OUTPUT"

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ steps.vite.outputs.url }}
            NGINX_CONFIG=nginx.edge.conf
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-frontend
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

  deploy:
    needs: [build, preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-frontend
          path: .

      - name: Copy image and nginx config
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "${{ env.IMAGE_NAME }}.tar.gz,frontend/nginx.edge.conf"
          target: "/tmp"
          overwrite: true

      - name: Load and run container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            EDGE_NGINX_DIR="$HOME/awardsferm-edge"
            EDGE_NETWORK="awardsferm-edge"

            mkdir -p "$EDGE_NGINX_DIR"
            cp /tmp/nginx.edge.conf "$EDGE_NGINX_DIR/nginx.conf"
            chmod 644 "$EDGE_NGINX_DIR/nginx.conf"
            docker network create "$EDGE_NETWORK" 2>/dev/null || true
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz /tmp/nginx.edge.conf
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              --network "$EDGE_NETWORK" \
              -v "$EDGE_NGINX_DIR/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              $IMAGE_NAME:latest
            sleep 2
            CODE=$(curl -sS -o /tmp/fe_index.html -w "%{http_code}" --max-time 10 "http://127.0.0.1:${HOST_PORT}/" || echo "000")
            echo "GET / HTTP $CODE"
            API_CODE=$(curl -sS -o /tmp/fe_health.json -w "%{http_code}" --max-time 20 "http://127.0.0.1:${HOST_PORT}/api/health" || echo "000")
            echo "GET /api/health HTTP $API_CODE"
